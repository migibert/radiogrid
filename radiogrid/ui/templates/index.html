<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RadioGrid</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header id="header">
    <h1>📡 RadioGrid</h1>
    <span class="subtitle">Bot Exploration &amp; Communication Game</span>
  </header>

  <main>
    <!-- ===== SETUP PANEL ===== -->
    <section id="setup-panel" class="panel">
      <h2>Game Setup</h2>

      <!-- Map settings -->
      <fieldset>
        <legend>Map</legend>
        <label>Width  <input id="cfg-width"  type="number" value="20" min="5" max="100"/></label>
        <label>Height <input id="cfg-height" type="number" value="20" min="5" max="100"/></label>
        <label>Obstacles <input id="cfg-obstacles" type="range" min="0" max="0.5" step="0.01" value="0.2"/>
          <span id="cfg-obstacles-val">20%</span></label>
        <label>Traps <input id="cfg-traps" type="range" min="0" max="0.3" step="0.01" value="0.05"/>
          <span id="cfg-traps-val">5%</span></label>
        <label>Seed <input id="cfg-seed" type="number" placeholder="random"/></label>
      </fieldset>

      <!-- Turns -->
      <fieldset>
        <legend>Game</legend>
        <label>Max Turns <input id="cfg-turns" type="number" value="200" min="1" max="10000"/></label>
      </fieldset>

      <!-- Teams -->
      <fieldset>
        <legend>Teams <small>(min 2)</small></legend>
        <div id="team-list"></div>
        <button id="btn-add-team" class="btn btn-secondary">+ Add Team</button>
      </fieldset>

      <button id="btn-run" class="btn btn-primary">▶ Run Game</button>
      <div id="status-msg"></div>
    </section>

    <!-- ===== VISUALISATION ===== -->
    <section id="vis-panel" class="panel hidden">
      <div id="vis-header">
        <h2>Replay</h2>
        <div id="scoreboard"></div>
      </div>

      <div id="canvas-wrap">
        <canvas id="grid-canvas"></canvas>
      </div>

      <div id="playback-controls">
        <button id="btn-start" class="btn" title="Start">⏮</button>
        <button id="btn-prev"  class="btn" title="Previous">◀</button>
        <button id="btn-play"  class="btn" title="Play/Pause">⏯</button>
        <button id="btn-next"  class="btn" title="Next">▶</button>
        <button id="btn-end"   class="btn" title="End">⏭</button>
        <label>Speed
          <input id="speed-slider" type="range" min="1" max="60" value="10"/>
          <span id="speed-val">10 t/s</span>
        </label>
        <span id="turn-info">Turn 0 / 0</span>
      </div>

      <button id="btn-back" class="btn btn-secondary">← New Game</button>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
